# ~/.snmp/snmp.conf — Parámetros SNMPv3 por defecto en manager
# Práctica GP4 - Parte 3, paso 4
#
# NOTA PARA EL ALUMNO:
#   Crea este fichero en /home/vagrant/.snmp/snmp.conf del manager.
#   Con estos parámetros por defecto, el comando:
#
#     snmpget -v 3 -u vagrant -l authPriv -a SHA -A vagrant1234 \
#             -x AES -X vagrant1234 10.0.125.3 SNMPv2-MIB::sysUpTime.0
#
#   se puede simplificar a:
#
#     snmpget 10.0.125.3 SNMPv2-MIB::sysUpTime.0
#
#   Documentación:
#     http://net-snmp.sourceforge.net/docs/man/snmp.conf.html

# TODO: rellena los parámetros por defecto para SNMPv3
defVersion      # TODO: versión SNMP
defSecurityName # TODO: nombre del usuario
defSecurityLevel # TODO: nivel de seguridad (authPriv / authNoPriv / noAuthNoPriv)
defAuthType     # TODO: algoritmo de autenticación
defAuthPassphrase # TODO: contraseña de autenticación
defPrivType     # TODO: algoritmo de privacidad
defPrivPassphrase # TODO: contraseña de privacidad
